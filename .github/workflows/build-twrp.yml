name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1
      BUILD_TARGET:
        description: 'Build Target (recovery/boot)'
        required: true
        default: 'recovery'
        type: choice
        options:
          - recovery
          - boot
      THREADS:
        description: 'Number of build threads (1-4)'
        required: true
        default: '2'
        type: integer
        min: 1
        max: 4

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240  # 4 часа максимум
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: device/samsung/m13
        
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Build TWRP using sameer/action
      uses: sameer/twrp-builder-action@v1
      with:
        device: samsung/m13
        branch: ${{ inputs.MANIFEST_BRANCH }}
        recovery: ${{ inputs.BUILD_TARGET == 'recovery' }}
        threads: ${{ inputs.THREADS }}
        ccache: true
        
    - name: Upload Artifacts
      if: always()  # Загружаем даже при ошибке
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          out/target/product/*/recovery.img
          out/target/product/*/boot.img
          out/target/product/*/twrp*.img
        retention-days: 14
        
    - name: Create GitHub Release (on success)
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: twrp-m13-${{ github.run_number }}
        name: TWRP for Samsung Galaxy M13
        generate-release-notes: true
        files: |
          out/target/product/*/recovery.img
          out/target/product/*/boot.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
