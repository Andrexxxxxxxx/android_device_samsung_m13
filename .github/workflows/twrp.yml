    - name: Device tree
      working-directory: android_root
      run: |
        export PATH="${PATH}:~/.bin"
        rm -rf .repo/local_manifests
        git clone "$DT_URL" -b "$DT_BRANCH" device/asus/I003D
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/roomservice.xml << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="$DT_URL" path="device/asus/I003D" remote="github" revision="$DT_BRANCH" />
        </manifest>
        EOF
        repo sync -c --force-sync -j$(nproc --all)

    - name: Build TWRP
      working-directory: android_root
      run: |
        export PATH="${PATH}:~/.bin"
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
        source build/envsetup.sh
        lunch twrp_I003D-eng
        mka recoveryimage

    - name: Upload TWRP
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-I003D-${{ github.run_number }}
        path: android_root/out/target/product/I003D/recovery.img
