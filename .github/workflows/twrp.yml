name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install Official repo Tool
      run: |
        # УДАЛЯЕМ pip-версию если была
        python3 -m pip uninstall -y repo || true
        
        # Скачиваем ОФИЦИАЛЬНЫЙ repo скрипт от Google
        sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo
        
        # Проверяем установку
        /usr/local/bin/repo --version
        head -3 /usr/local/bin/repo
        
    - name: Configure Git for Public Access
      run: |
        # Полная очистка credentials
        git config --global --unset credential.helper || true
        git config --global credential.helper ""
        rm -f ~/.git-credentials ~/.netrc
        
        # Force HTTPS
        git config --global url."https://".insteadOf git://
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Test GitHub Access
      run: |
        # Проверяем доступ к манифесту
        echo "Testing GitHub access..."
        curl -I https://github.com/twrp/manifest.git 2>&1 | head -3
        
        # Проверяем repo команды
        /usr/local/bin/repo --help | head -10
        
    - name: Initialize TWRP Sources
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/true
