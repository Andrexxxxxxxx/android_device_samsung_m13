name: Build TWRP Recovery

# -------------------------------------------------
# Триггеры
# -------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

# -------------------------------------------------
# Окружение и ограничения
# -------------------------------------------------
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    # Отключаем токены, которые могут быть переданы в шагах
    env:
      GITHUB_TOKEN: ""
      GITHUB_ACTIONS_TOKEN: ""

    steps:
      # -------------------------------------------------
      # 1️⃣ Checkout репозитория
      # -------------------------------------------------
      - name: Checkout Device Tree
        uses: actions/checkout@v4
        with:
          # сохраняем токены, чтобы можно было пушить результаты позже
          persist-credentials: true

      # -------------------------------------------------
      # 2️⃣ Устанавливаем JDK 11 (требуется для Android)
      # -------------------------------------------------
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      # -------------------------------------------------
      # 3️⃣ Кешируем папку с Gradle‑зависимостями
      # -------------------------------------------------
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -------------------------------------------------
      # 4️⃣ Устанавливаем Android SDK / Command‑line tools
      # -------------------------------------------------
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2
          ndk: 25.2.933565
          cache: true

      # -------------------------------------------------
      # 5️⃣ Клонируем нужный ветвь TWRP‑manifest
      # -------------------------------------------------
      - name: Checkout TWRP Manifest
        run: |
          git clone https://github.com/TeamWin/android_manifest.git -b ${{ github.event.inputs.MANIFEST_BRANCH }} device/teamscope/m13
          # При необходимости поменяйте путь/репозиторий под ваш форк

      # -------------------------------------------------
      # 6️⃣ Выбираем целевое устройство (lunch)
      # -------------------------------------------------
      - name: Lunch
        run: |
          source build/envsetup.sh
          lunch twrp_m13-eng

      # -------------------------------------------------
      # 7️⃣ Сборка TWRP
      # -------------------------------------------------
      - name: Build TWRP
        run: |
          mka recoveryimage -j$(nproc)

      # -------------------------------------------------
      # 8️⃣ А publikujem артефакт (образ)
      # -------------------------------------------------
      - name: Upload TWRP Image
        uses: actions/upload-artifact@v4
        with:
          name: twrp-${{ github.event.inputs.MANIFEST_BRANCH }}
          path: out/target/product/m13/*.img
          retention-days: 7