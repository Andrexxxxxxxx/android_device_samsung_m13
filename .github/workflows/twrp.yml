name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install repo tool
      run: |
        # Установка через pip (работает лучше)
        python3 -m pip install --user repo
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        repo --version
        
    - name: Configure Git
      run: |
        # ПОЛНАЯ очистка всех credentials
        rm -f ~/.git-credentials ~/.netrc
        git config --global --unset credential.helper || true
        git config --global credential.helper ""
        git config --global --unset-all github.token || true
        git config --global --unset-all http.https://github.com/.extraheader || true
        git config --global url."https://".insteadOf git://
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Test GitHub Access
      run: |
        # Проверяем доступ к manifest
        curl -s -o /dev/null -w "%{http_code}" https://github.com/twrp/manifest.git
        git ls-remote https://github.com/twrp/manifest.git HEAD 2>&1 | head -5
        
    - name: Initialize TWRP Sources
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/true
        
        repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1
        
        repo sync -c --no-tags -j2 --force-sync
        
    - name: Debug Device Tree
      run: |
        cd $GITHUB_WORKSPACE
        echo "Current: $(pwd)"
        echo "Files:"
        ls -la
        echo "Find AndroidProducts.mk:"
        find . -name "AndroidProducts.mk" -type f
        
    - name: Copy Device Tree
      run: |
        cd $GITHUB_WORKSPACE
        
        # Ищем AndroidProducts.mk
        if [ -f "AndroidProducts.mk" ]; then
          SRC="."
        elif [ -f "device/samsung/m13/AndroidProducts.mk" ]; then
          SRC="device/samsung/m13"
        else
          FOUND=$(find . -name "AndroidProducts.mk" -type f | head -1)
          if [ -n "$FOUND" ]; then
            SRC=$(dirname "$FOUND")
          else
            echo "ERROR: AndroidProducts.mk not found!"
            exit 1
          fi
        fi
        
        mkdir -p twrp-src/device/samsung/m13
        cp -r "$SRC"/* twrp-src/device/samsung/m13/
        
        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ Copied successfully"
        else
          echo "❌ Failed"
          ls -la twrp-src/device/samsung/m13/
          exit 1
        fi
        
    - name: Build TWRP
      run: |
        cd twrp-src
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh
        
        lunch twrp_m13-eng || lunch omni_m13-eng || lunch aosp_m13-eng || lunch twrp_m13-userdebug
        
        make recoveryimage -j2
        
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          twrp-src/out/target/product/*/recovery.img
          twrp-src/out/target/product/*/boot.img
        retention-days: 14
