name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        persist-credentials: false  # КРИТИЧЕСКИ ВАЖНО
        
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install repo
      run: |
        sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo
        echo "/usr/local/bin" >> $GITHUB_PATH
        repo --version

    - name: Configure Git (NO AUTH)
      run: |
        # УДАЛЯЕМ credential файлы
        rm -f ~/.git-credentials ~/.netrc
        
        # УБИРАЕМ credential helper
        git config --global --unset credential.helper 2>/dev/null || true
        git config --global credential.helper ""
        
        # УБИРАЕМ extraheader (токен GitHub Actions)
        git config --global --unset http.https://github.com/.extraheader 2>/dev/null || true
        
        # Force HTTPS
        git config --global url."https://".insteadOf git://
        
        # Устанавливаем пользователя
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Test GitHub Access (no token)
      run: |
        # Проверяем, что git не использует токен
        git ls-remote https://github.com/twrp/manifest.git HEAD 2>&1 | head -3
        
    - name: Initialize TWRP Sources
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        # ОТКЛЮЧАЕМ все способы аутентификации
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/false
        export GIT_CREDENTIAL_HELPER=""
        
        repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1
        
        repo sync -c --no-tags -j2 --force-sync
        
    - name: Copy Device Tree
      run: |
        cd $GITHUB_WORKSPACE
        
        # Ищем AndroidProducts.mk
        if [ -f "AndroidProducts.mk" ]; then
          SRC="."
        elif [ -f "device/samsung/m13/AndroidProducts.mk" ]; then
          SRC="device/samsung/m13"
        else
          FOUND=$(find . -name "AndroidProducts.mk" -type f | head -1)
          if [ -n "$FOUND" ]; then
            SRC=$(dirname "$FOUND")
          else
            echo "ERROR: AndroidProducts.mk not found!"
            find . -maxdepth 3 -type d
            exit 1
          fi
        fi
        
        mkdir -p twrp-src/device/samsung/m13
        cp -r "$SRC"/* twrp-src/device/samsung/m13/ 2>/dev/null || true
        
        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ Device tree copied"
        else
          echo "❌ Copy failed"
          ls -la twrp-src/device/samsung/m13/ || echo "Dir empty"
          exit 1
        fi
        
    - name: Build TWRP
      run: |
        cd twrp-src
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh
        
        lunch twrp_m13-eng || lunch omni_m13-eng || lunch aosp_m13-eng || lunch twrp_m13-userdebug
        
        m recoveryimage -j2
        
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          twrp-src/out/target/product/*/recovery.img
          twrp-src/out/target/product/*/boot.img

name: Commit changes

on:
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Отключаем автоматическое сохранение GITHUB_TOKEN,
          # чтобы мы могли подменить его своим PAT.
          persist-credentials: false

      - name: Configure git user
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set remote with PAT
        run: |
          # Преобразуем https://github.com/owner/repo.git → https://<TOKEN>@github.com/owner/repo.git
          git remote set-url origin https://$PAT_TOKEN@github.com/${{ github.repository }}.git

      - name: Make changes (пример)
        run: |
          echo "new line $(date)" >> file.txt
          git add file.txt
          git commit -m "Add timestamp"

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
