name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        persist-credentials: false  # ОТКЛЮЧАЕМ токен
        
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
          
    - name: Install repo
      run: |
        sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo
        echo "/usr/local/bin" >> $GITHUB_PATH
        repo --version
        
    - name: Configure Git (NO AUTH)
      run: |
        # Удаляем файлы с credentials
        rm -f ~/.git-credentials ~/.netrc ~/.config/git/credential

        # Удаляем настройки credential.helper
        git config --global --remove-section credential 2>/dev/null || true
        git config --global --unset-all credential.helper 2>/dev/null || true

        # Удаляем настройки, связанные с GitHub (токен Actions)
        git config --global --unset http.https://github.com/.extraheader 2>/dev/null || true

        # Удаляем прокси
        git config --global --unset http.proxy 2>/dev/null || true
        git config --global --unset https.proxy 2>/dev/null || true

        # Force HTTPS
        git config --global url."https://".insteadOf git://

        # Устанавливаем пользователя
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

        # Показываем, что осталось
        echo "=== Git global config after cleanup ==="
        git config --global --list

    - name: Test GitHub Access (no token)
      run: |
        echo "=== Git version ==="
        git --version
        echo "=== Trying to access manifest ==="
        git ls-remote https://github.com/twrp/manifest.git HEAD 2>&1 || echo "FAILED: git ls-remote"
        
    - name: Initialize TWRP Sources
      run: |
        mkdir -p twrp-src
        cd twrp-src

        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/false
        export GIT_CREDENTIAL_HELPER=""
        export GIT_PROXY_COMMAND=""
        export HTTP_PROXY=""
        export HTTPS_PROXY=""

        echo "=== Git config in this step ==="
        git config --global --list

        echo "=== repo init ==="
        repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1

        echo "=== repo sync ==="
        repo sync -c --no-tags -j2 --force-sync

    - name: Copy Device Tree
      run: |
        cd $GITHUB_WORKSPACE

        if [ -f "AndroidProducts.mk" ]; then
          SRC="."
        elif [ -f "device/samsung/m13/AndroidProducts.mk" ]; then
          SRC="device/samsung/m13"
        else
          FOUND=$(find . -name "AndroidProducts.mk" -type f | head -1)
          if [ -n "$FOUND" ]; then
            SRC=$(dirname "$FOUND")
          else
            echo "ERROR: AndroidProducts.mk not found!"
            find . -maxdepth 3 -type d
            exit 1
          fi
        fi

        mkdir -p twrp-src/device/samsung/m13
        cp -r "$SRC"/* twrp-src/device/samsung/m13/ 2>/dev/null || true

        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ Device tree copied"
        else
          echo "❌ Copy failed"
          ls -la twrp-src/device/samsung/m13/ || echo "Dir empty"
          exit 1
        fi

    - name: Build TWRP
      run: |
        cd twrp-src

        if [ ! -f "device/samsung/m13/AndroidProducts.mk" ]; then
          echo "ERROR: AndroidProducts.mk missing in device tree!"
          find . -name "AndroidProducts.mk" -type f
          exit 1
        fi

        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh

        lunch twrp_m13-eng || lunch omni_m13-eng || lunch aosp_m13-eng || lunch twrp_m13-userdebug

        m recoveryimage -j2

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          twrp-src/out/target/product/*/recovery.img
          twrp-src/out/target/product/*/boot.img
          twrp-src/out/target/product/*/twrp*.img
        retention-days: 14
