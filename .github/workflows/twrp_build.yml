name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap (критично!)
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install repo tool (correct way)
      run: |
        mkdir -p /home/runner/bin
        curl -L https://storage.googleapis.com/git-repo-downloads/repo > /home/runner/bin/repo
        chmod a+x /home/runner/bin/repo
        echo "/home/runner/bin" >> $GITHUB_PATH
        export PATH="/home/runner/bin:$PATH"
        /home/runner/bin/repo --version
        
    - name: Initialize TWRP Sources (FIXED)
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        # Настройки git для обхода аутентификации
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git config --global credential.helper ''
        git config --global url."https://".insteadOf git://
        
        # Отключаем обновление repo launcher и интерактивный режим
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=echo
        
        # Инициализируем repo
        /home/runner/bin/repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1
        
        # Синхронизируем
        /home/runner/bin/repo sync -c --no-tags -j$(nproc --all)
        
    - name: Copy Device Tree
      run: |
        # Проверяем наличие AndroidProducts.mk
        if [ -f "AndroidProducts.mk" ]; then
          echo "✅ AndroidProducts.mk found in root"
        else
          echo "❌ AndroidProducts.mk NOT found in root"
          find . -name "AndroidProducts.mk" -type f
          exit 1
        fi
        
        # Копируем device tree
        mkdir -p twrp-src/device/samsung/m13
        cp -r ./* twrp-src/device/samsung/m13/
        
        # Проверяем копирование
        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ Device tree copied successfully"
        else
          echo "❌ AndroidProducts.mk not found after copy"
          ls -la twrp-src/device/samsung/m13/
          exit 1
        fi
        
    - name: Build TWRP
      run: |
        cd twrp-src
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh
        
        # Пробуем разные варианты lunch
        lunch twrp_m13-eng || lunch om
