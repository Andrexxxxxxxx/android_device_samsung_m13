name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies (FIXED)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
          
    - name: Install repo tool (with PATH fix)
      run: |
        mkdir -p $HOME/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
        chmod a+x $HOME/bin/repo
        
        # Явно добавляем в PATH для ВСЕХ последующих шагов
        echo "$HOME/bin" >> $GITHUB_PATH
        
        # Проверяем
        which repo
        repo --version
        
    - name: Configure Git for Public Access
      run: |
        git config --global credential.helper ""
        git config --global url."https://".insteadOf git://
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Initialize TWRP Sources (FIXED)
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        # Отключаем всё, что может запрашивать аутентификацию
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/true
        
        # Прямой манифест ТОЛЬКО для публичных репо
        repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1
        
        repo sync -c --no-tags -j2 --force-sync
        
    - name: Copy Device Tree
      run: |
        cd $GITHUB_WORKSPACE
        
        # Debug: показываем структуру
        echo "=== Current directory ==="
        pwd
        echo "=== All files ==="
        ls -la
        echo "=== Searching AndroidProducts.mk ==="
        find . -name "AndroidProducts.mk" -type f 2>/dev/null
        
        # Копируем в зависимости от структуры
        if [ -f "AndroidProducts.mk" ]; then
          echo "✅ AndroidProducts.mk in root"
          mkdir -p twrp-src/device/samsung/m13
          cp -r ./* twrp-src/device/samsung/m13/ 2>/dev/null || true
        elif [ -f "device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ AndroidProducts.mk in device/samsung/m13/"
          mkdir -p twrp-src/device/samsung
          cp -r device/samsung/m13 twrp-src/device/samsung/
        else
          echo "❌ AndroidProducts.mk not found"
          echo "Trying to locate it:"
          find . -name "*.mk" -type f | head -20
          exit 1
        fi
        
        # Проверяем результат
        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ Copy successful"
        else
          echo "❌ Copy failed"
          ls -la twrp-src/device/samsung/m13/ || true
          exit 1
        fi
        
    - name: Build TWRP
      run: |
        cd twrp-src
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh
        
        lunch twrp_m13-eng || lunch omni_m13-eng || lunch aosp_m13-eng || lunch twrp_m13-userdebug
        
        make recoveryimage -j2
        
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          twrp-src/out/target/product/*/recovery.img
          twrp-src/out/target/product/*/boot.img
        retention-days: 14
