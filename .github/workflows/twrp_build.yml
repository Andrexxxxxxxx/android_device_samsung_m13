name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install repo tool (EXPLICIT PATH)
      run: |
        mkdir -p $HOME/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
        chmod a+x $HOME/bin/repo
        
        # Явно экспортируем PATH для ТЕКУЩЕГО шага и сохраняем в GITHUB_PATH
        echo "$HOME/bin" >> $GITHUB_PATH
        export PATH="$HOME/bin:$PATH"
        
        # Проверяем
        ls -la $HOME/bin/repo
        $HOME/bin/repo --version
        
    - name: Configure Git
      run: |
        git config --global credential.helper ""
        git config --global url."https://".insteadOf git://
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Initialize TWRP Sources (FIXED v2)
     run: |
       mkdir -p twrp-src
       cd twrp-src
       
       # Настройки git
       git config --global credential.helper ""
       git config --global url."https://".insteadOf git://
       git config --global url."https://github.com/".insteadOf "git@github.com:"
       git config --global user.email "actions@github.com"
       git config --global user.name "GitHub Actions"
       
       # Отключаем всё, что может
    - name: Copy Device Tree
      run: |
        cd $GITHUB_WORKSPACE
        
        echo "Current directory: $(pwd)"
        echo "Files in root:"
        ls -la
        
        echo "Searching for AndroidProducts.mk:"
        find . -name "AndroidProducts.mk" -type f 2>/dev/null
        
        # Копируем в зависимости от расположения
        if [ -f "AndroidProducts.mk" ]; then
          echo "Found in root"
          mkdir -p twrp-src/device/samsung/m13
          cp -r ./* twrp-src/device/samsung/m13/ 2>/dev/null || true
        elif [ -f "device/samsung/m13/AndroidProducts.mk" ]; then
          echo "Found in device/samsung/m13/"
          cp -r device/samsung/m13 twrp-src/device/samsung/
        else
          echo "AndroidProducts.mk not found in expected locations"
          # Пытаемся найти любой .mk файл для подсказки
          echo "All .mk files:"
          find . -name "*.mk" -type f | head -20
          exit 1
        fi
        
        # Проверка
        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "✅ Copy successful"
        else
          echo "❌ Copy failed"
          echo "Contents of twrp-src/device/samsung/:"
          ls -la twrp-src/device/samsung/ 2>/dev/null || true
          exit 1
        fi
        
    - name: Build TWRP
      run: |
        cd twrp-src
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh
        
        lunch twrp_m13-eng || lunch omni_m13-eng || lunch aosp_m13-eng || lunch twrp_m13-userdebug
        
        make recoveryimage -j2
        
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          twrp-src/out/target/product/*/recovery.img
          twrp-src/out/target/product/*/boot.img
        retention-days: 14
