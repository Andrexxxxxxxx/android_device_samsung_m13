name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap (критично!)
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install repo tool
      run: |
        curl -L https://storage.googleapis.com/git-repo-downloads/repo | sudo tee /usr/local/bin/repo > /dev/null
        sudo chmod a+x /usr/local/bin/repo
        which repo
        repo --version
        
    - name: Initialize TWRP Sources
      run: |
        mkdir -p twrp-src
        cd twrp-src
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        export REPO_NO_LAUNCHER_UPDATE=1
        repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1
        repo sync -c --no-tags -j$(nproc --all)
        
    - name: Copy Device Tree
      run: |
        if [ -f "AndroidProducts.mk" ]; then
          echo "✅ AndroidProducts.mk found in root"
        else
          echo "❌ AndroidProducts.mk NOT found in root"
          find . -name "AndroidProducts.mk" -type f
        fi
        
        mkdir -p twrp-src/device/samsung/m13
        cp -r ./* twrp-src/device/samsung/m13/ 2>/dev/null || true
        
