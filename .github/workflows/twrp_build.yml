name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
          
    - name: Install repo tool
      run: |
        # Устанавливаем repo ЛОКАЛЬНО для текущего пользователя
        mkdir -p $HOME/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
        chmod a+x $HOME/bin/repo
        
        # Добавляем в PATH
        echo "$HOME/bin" >> $GITHUB_PATH
        
        # Проверяем установку
        which repo
        repo --version
        
    - name: Configure Git (IMPORTANT)
      run: |
        # УДАЛЯЕМ ВСЕ credential helpers
        git config --global --unset credential.helper || true
        git config --global credential.helper ""
        
        # Удаляем ~/.netrc и ~/.git-credentials если есть
        rm -f ~/.netrc
        rm -f ~/.git-credentials
        
        # Устанавливаем настройки для публичного доступа
        git config --global url."https://".insteadOf git://
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Initialize TWRP Sources (FIXED)
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        # КРИТИЧЕСКИ ВАЖНО: отключаем все формы аутентификации
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/true
        export G
