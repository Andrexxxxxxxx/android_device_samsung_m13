name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
          - twrp-13.0
          - twrp-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        large-packages: true
        
    - name: Add 4GB Swap
      run: |
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
        free -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3
        
    - name: Install repo tool
      run: |
        mkdir -p $HOME/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
        chmod a+x $HOME/bin/repo
        
        echo "$HOME/bin" >> $GITHUB_PATH
        export PATH="$HOME/bin:$PATH"
        
        $HOME/bin/repo --version
        
    - name: Configure Git
      run: |
        # Remove any credentials
        rm -f ~/.git-credentials
        rm -f ~/.netrc
        
        # Disable credential helper
        git config --global --unset credential.helper || true
        git config --global credential.helper ""
        
        # Force HTTPS
        git config --global url."https://".insteadOf git://
        
        # Set user
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    - name: Initialize TWRP Sources (FIXED)
      run: |
        mkdir -p twrp-src
        cd twrp-src
        
        # Disable auth
        export REPO_NO_LAUNCHER_UPDATE=1
        export GIT_TERMINAL_PROMPT=0
        export GIT_ASKPASS=/bin/true
        unset GITHUB_TOKEN
        export GITHUB_TOKEN=""
        
        # Initialize
        $HOME/bin/repo init -u https://github.com/twrp/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1 --no-tags
        
        # Sync
        $HOME/bin/repo sync -c --no-tags -j2 --force-sync
        
    - name: Copy Device Tree
      run: |
        cd $GITHUB_WORKSPACE
        
        # Debug structure
        echo "Current dir: $(pwd)"
        ls -la
        find . -name "AndroidProducts.mk" -type f 2>/dev/null
        
        SOURCE_PATH=""
        if [ -f "AndroidProducts.mk" ]; then
          SOURCE_PATH="."
        elif [ -f "device/samsung/m13/AndroidProducts.mk" ]; then
          SOURCE_PATH="device/samsung/m13"
        elif [ -f "android_device_samsung_m13/AndroidProducts.mk" ]; then
          SOURCE_PATH="android_device_samsung_m13"
        else
          # Try to find any AndroidProducts.mk
          FOUND=$(find . -name "AndroidProducts.mk" -type f | head -1)
          if [ -n "$FOUND" ]; then
            SOURCE_PATH=$(dirname "$FOUND")
          else
            echo "ERROR: AndroidProducts.mk not found"
            exit 1
          fi
        fi
        
        mkdir -p twrp-src/device/samsung/m13
        cp -r "$SOURCE_PATH"/* twrp-src/device/samsung/m13/ 2>/dev/null || true
        
        if [ -f "twrp-src/device/samsung/m13/AndroidProducts.mk" ]; then
          echo "Device tree copied"
        else
          echo "Copy failed. Source: $SOURCE_PATH"
          ls -la "$SOURCE_PATH"
          exit 1
        fi
        
    - name: Build TWRP
      run: |
        cd twrp-src
        
        # Verify device tree
        if [ ! -f "device/samsung/m13/AndroidProducts.mk" ]; then
          echo "ERROR: Device tree not in correct location"
          find . -name "AndroidProducts.mk" -type f
          exit 1
        fi
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        source build/envsetup.sh
        
        lunch twrp_m13-eng || lunch omni_m13-eng || lunch aosp_m13-eng || lunch twrp_m13-userdebug
        
        make recoveryimage -j2
        
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-${{ inputs.MANIFEST_BRANCH }}-${{ github.run_number }}
        path: |
          twrp-src/out/target/product/*/recovery.img
          twrp-src/out/target/product/*/boot.img
        retention-days: 14
